services:
  - type: web
      name: uy-catastro-mcp
          env: node
              buildCommand: npm install && npm run build
                  startCommand: npm start
                      healthCheckPath: /health
                          envVars:
                                - key: PORT
                                        value: 10000
                                              - key: CATASTRO_MODE
                                                      value: demo
